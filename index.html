<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NBA Injury Report</title>
<style>
/* === HOOPSMATIC DESIGN SYSTEM v1.0 === */
:root {
  --bg: #f8f9fa; --surface: #fff; --surface2: #f3f4f6;
  --border: #e2e5e9; --text: #1a1a2e; --text2: #5a6070; --text-muted: #8892a6;
  --accent: #3b82f6; --accent-dim: rgba(59,130,246,0.07);
  --accent-gold: #f0b637; --accent-cyan: #0ea5e9;
  --green: #16a34a; --red: #dc2626; --orange: #f59e0b;
  --surplus-pos: #10b981; --surplus-neg: #ef4444; --surplus-neutral: #6b7280;
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'DM Sans',-apple-system,BlinkMacSystemFont,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; line-height:1.5; }
::-webkit-scrollbar{height:5px;width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:3px}

/* — Header — */
.header { background:var(--surface); border-bottom:1px solid var(--border); padding:1.5rem 2rem 1.25rem; }
.header::before { display:none; }
.header-inner { max-width:1400px; margin:0 auto; display:flex; align-items:baseline; gap:0.75rem; flex-wrap:wrap; }
.header h1, .header-brand h1 { font-weight:800; font-size:1.5rem; letter-spacing:-0.02em; color:var(--text); }
.header .tag { font-family:'JetBrains Mono','DM Mono',monospace; font-size:0.6rem; color:var(--accent); background:var(--accent-dim); padding:0.2em 0.6em; border-radius:4px; letter-spacing:0.04em; }
.header-subtitle { color:var(--text2); font-size:0.85rem; }

/* — Stat Cards — */
.stats-bar { max-width:1400px; margin:1rem auto 0; padding:0 2rem; display:grid; grid-template-columns:repeat(4,1fr); gap:0.75rem; }
.stat-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:1rem 1.15rem; }
.stat-card .label { font-family:'JetBrains Mono','DM Mono',monospace; font-size:0.6rem; text-transform:uppercase; letter-spacing:0.08em; color:var(--text-muted); margin-bottom:0.2rem; }
.stat-card .value { font-weight:700; font-size:1.35rem; color:var(--text); }
.stat-card .value .unit { font-size:0.8rem; font-weight:400; color:var(--text2); }

/* — Controls — */
.controls { max-width:1400px; margin:1.25rem auto 0; padding:0 2rem; display:flex; gap:0.75rem; flex-wrap:wrap; align-items:center; }
.search-box { flex:1; min-width:200px; position:relative; }
.search-box input { width:100%; background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:0.55rem 0.85rem 0.55rem 2.3rem; color:var(--text); font-family:inherit; font-size:0.85rem; outline:none; transition:border-color 0.2s; }
.search-box input:focus { border-color:var(--accent); }
.search-box input::placeholder { color:var(--text-muted); }
.search-box .icon { position:absolute; left:0.8rem; top:50%; transform:translateY(-50%); color:var(--text-muted); font-size:0.85rem; }
.filter-group { display:flex; gap:0.5rem; align-items:center; }
.filter-group label { font-size:0.7rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.05em; font-weight:600; }
select { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:0.55rem 0.85rem; color:var(--text); font-family:inherit; font-size:0.85rem; outline:none; cursor:pointer; }
select:focus { border-color:var(--accent); }

/* — Buttons — */
.ctrl-btn { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:0.5rem 1rem; color:var(--text); font-family:inherit; font-size:0.82rem; font-weight:500; cursor:pointer; transition:border-color 0.15s, background 0.15s; white-space:nowrap; }
.ctrl-btn:hover:not(:disabled) { border-color:var(--accent); background:var(--accent-dim); }
.ctrl-btn:disabled { opacity:0.4; cursor:default; }
.ctrl-btn.active { border-color:var(--accent); background:var(--accent-dim); color:var(--accent); font-weight:600; }

/* — Tables — */
.table-container { max-width:1400px; margin:1.25rem auto 3rem; padding:0 2rem; overflow-x:auto; }
table { width:100%; border-collapse:collapse; font-size:0.82rem; }
thead th { position:sticky; top:0; z-index:10; background:var(--surface2); font-family:'JetBrains Mono','DM Mono',monospace; font-size:0.62rem; font-weight:500; text-transform:uppercase; letter-spacing:0.06em; color:var(--text-muted); padding:0.6rem 0.5rem; text-align:left; border-bottom:1px solid var(--border); white-space:nowrap; cursor:pointer; user-select:none; }
thead th:hover { color:var(--accent); }
tbody tr { border-bottom:1px solid var(--border); transition:background 0.12s; }
tbody tr:hover { background:rgba(59,130,246,0.03); }
tbody td { padding:0.55rem 0.5rem; vertical-align:middle; white-space:nowrap; }

/* — Loading & Errors — */
.loading-overlay, .loading-state { text-align:center; padding:4rem 2rem; color:var(--text2); }
.loading-overlay .spinner, .loading-spinner { display:inline-block; width:36px; height:36px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:hmSpin 0.8s linear infinite; margin:0 auto 1rem; }
@keyframes hmSpin { to { transform:rotate(360deg); } }
.loading-overlay p { color:var(--text2); font-size:0.9rem; }
.error-msg { color:var(--red); max-width:600px; margin:0 auto; text-align:center; }

/* — Footer — */
.footer { max-width:1400px; margin:0 auto; padding:1.5rem 2rem 2.5rem; text-align:center; font-size:0.75rem; color:var(--text-muted); border-top:1px solid var(--border); }
.footer a, footer a { color:var(--accent); text-decoration:none; }

/* — Responsive — */
@media(max-width:900px) { .stats-bar{grid-template-columns:repeat(2,1fr);} .controls{flex-direction:column;} .search-box{min-width:100%;} }
@media(max-width:600px) { .stats-bar{grid-template-columns:1fr 1fr;gap:0.5rem;} .stat-card{padding:0.75rem;} .stat-card .value{font-size:1.1rem;} .header{padding:1.25rem 1rem 1rem;} .header h1,.header-brand h1{font-size:1.25rem;} .table-container{padding:0 0.5rem;} td,th{padding:0.4rem 0.35rem;} }

/* — Injury status colors — */
--out: #dc2626; --doubtful: #ea580c; --questionable: #d97706;
--probable: #16a34a; --available: #059669;
--modified-bg: rgba(59,130,246,0.04); --modified-border: rgba(59,130,246,0.15);
}

/* — Admin layout — */
.report-modal-overlay { display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.4); z-index:10000; justify-content:center; align-items:center; padding:2rem; }
.report-modal-overlay.active { display:flex; }
.report-modal { background:#fff; border-radius:12px; max-width:700px; width:100%; max-height:80vh; display:flex; flex-direction:column; box-shadow:0 12px 40px rgba(0,0,0,0.2); }
.report-modal-header { padding:1.25rem 1.5rem; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.report-modal-header h3 { font-size:1rem; font-weight:700; }
.report-modal-header button { background:none; border:none; font-size:1.2rem; cursor:pointer; color:var(--text2); padding:4px 8px; }
.report-modal-body { padding:1.25rem 1.5rem; overflow-y:auto; flex:1; }
.report-modal-body textarea { width:100%; min-height:250px; border:1px solid var(--border); border-radius:8px; padding:12px; font-family:inherit; font-size:13px; line-height:1.6; resize:vertical; color:var(--text); }
.report-modal-footer { padding:1rem 1.5rem; border-top:1px solid var(--border); display:flex; gap:8px; justify-content:flex-end; }
.report-modal-footer button { font-family:inherit; font-size:13px; font-weight:600; padding:8px 18px; border-radius:8px; border:1px solid var(--border); background:var(--surface); color:var(--text); cursor:pointer; }
.report-modal-footer button.primary { background:var(--accent); border-color:var(--accent); color:#fff; }
.report-modal-footer button.primary:hover { background:#2563eb; }
.admin-container { max-width:1100px; margin:0 auto; padding:16px 20px 80px; }
.admin-header { display:flex; align-items:center; gap:16px; padding:20px 0 16px; border-bottom:1px solid var(--border); margin-bottom:16px; }
.admin-header h1 { font-size:1.5rem; font-weight:800; letter-spacing:-0.02em; }
.admin-header .subtitle { color:var(--text2); font-size:13px; margin-left:auto; }

/* — Sticky toolbar — */
.admin-toolbar { position:sticky; top:0; z-index:100; background:var(--bg); border-bottom:1px solid var(--border); padding:10px 0; margin-bottom:16px; display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
.admin-toolbar button { font-family:inherit; font-size:12px; font-weight:600; padding:7px 14px; border-radius:8px; border:1px solid var(--border); background:var(--surface); color:var(--text); cursor:pointer; transition:all 0.15s; }
.admin-toolbar button:hover { background:var(--surface2); border-color:var(--accent); }
.admin-toolbar button.primary { background:var(--accent); border-color:var(--accent); color:#fff; }
.admin-toolbar button.primary:hover { background:#2563eb; }
.admin-toolbar button.success { background:var(--green)!important; border-color:var(--green)!important; color:#fff!important; }
.admin-toolbar .spacer { flex:1; }
.admin-toolbar .badge { font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:500; padding:4px 10px; border-radius:99px; background:var(--surface2); color:var(--text2); }
.admin-toolbar .badge.has-changes { background:var(--accent-dim); color:var(--accent); }

/* — Sync status — */
.sync-status { font-size:12px; display:flex; align-items:center; gap:4px; padding:4px 10px; border-radius:99px; white-space:nowrap; }
.sync-idle { color:var(--text2); }
.sync-syncing { color:var(--accent); animation:syncPulse 1s ease infinite; }
.sync-success { color:var(--green); }
.sync-error { color:var(--red); cursor:pointer; }
.sync-notoken { color:var(--orange); cursor:pointer; }
@keyframes syncPulse { 0%,100%{opacity:1} 50%{opacity:.5} }

/* — Filter bar — */
.filter-bar { display:flex; gap:8px; margin-bottom:16px; align-items:center; }
.filter-bar input { font-family:inherit; font-size:13px; padding:8px 12px; border-radius:8px; border:1px solid var(--border); background:var(--surface); color:var(--text); flex:1; max-width:320px; outline:none; }
.filter-bar input:focus { border-color:var(--accent); }
.filter-bar .filter-btn { font-family:inherit; font-size:12px; font-weight:600; padding:7px 12px; border-radius:8px; border:1px solid var(--border); background:var(--surface); color:var(--text2); cursor:pointer; transition:all 0.15s; }
.filter-bar .filter-btn:hover { color:var(--text); border-color:var(--accent); }
.filter-bar .filter-btn.active { background:var(--accent); border-color:var(--accent); color:#fff; }

/* — Team sections — */
.team-section { margin-bottom:8px; }
.team-header { display:flex; align-items:center; gap:10px; padding:10px 12px; background:var(--surface); border:1px solid var(--border); border-radius:10px; cursor:pointer; user-select:none; transition:all 0.15s; }
.team-header:hover { background:var(--surface2); }
.team-header img { width:28px; height:28px; }
.team-header .team-name { font-size:14px; font-weight:600; }
.team-header .team-count { font-size:12px; color:var(--text2); margin-left:auto; }
.team-header .team-injured { font-size:11px; font-weight:600; padding:2px 8px; border-radius:99px; background:rgba(220,38,38,0.08); color:var(--red); }
.team-header .team-injured.none { display:none; }
.team-header .chevron { color:var(--text2); font-size:14px; transition:transform 0.2s; margin-left:8px; }
.team-section.collapsed .chevron { transform:rotate(-90deg); }
.team-section.collapsed .team-players { display:none; }
.team-players { border:1px solid var(--border); border-top:none; border-radius:0 0 10px 10px; overflow:hidden; }

/* — Player row — */
.player-row { display:grid; grid-template-columns:1fr 90px 130px 1fr 110px 100px; gap:8px; align-items:center; padding:6px 12px; border-bottom:1px solid var(--border); font-size:13px; transition:background 0.15s; }
.player-row:last-child { border-bottom:none; }
.player-row:hover { background:rgba(59,130,246,0.03); }
.player-row.modified { background:var(--modified-bg); border-color:var(--modified-border); }
.player-name { font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.player-salary { font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--text2); text-align:right; }
.player-row select { font-family:inherit; font-size:12px; font-weight:600; padding:4px 6px; border-radius:6px; border:1px solid var(--border); background:var(--surface); color:var(--text); cursor:pointer; outline:none; width:100%; }
.player-row select:focus { border-color:var(--accent); }
.player-row select.s-out { color:var(--out); }
.player-row select.s-doubtful { color:var(--doubtful); }
.player-row select.s-questionable { color:var(--questionable); }
.player-row select.s-probable { color:var(--probable); }
.player-row select.s-available { color:var(--available); }
.player-row select.s-left-game { color:var(--doubtful); }
.player-row input[type="text"] { font-family:inherit; font-size:12px; padding:4px 6px; border-radius:6px; border:1px solid var(--border); background:var(--surface); color:var(--text); outline:none; width:100%; }
.player-row input[type="text"]:focus { border-color:var(--accent); }
.player-row input[type="text"].inactive { color:var(--text2); border-color:transparent; background:transparent; }
.player-row input[type="date"] { font-family:'JetBrains Mono',monospace; font-size:11px; padding:4px; border-radius:6px; border:1px solid var(--border); background:var(--surface); color:var(--text); outline:none; width:100%; color-scheme:light; }
.player-row input[type="date"]:focus { border-color:var(--accent); }
.player-row input[type="date"].inactive { color:var(--text2); border-color:transparent; background:transparent; }
.player-row select.prev-status { font-size:11px; opacity:0.7; }
.player-row select.prev-status:hover { opacity:1; }

/* — Column headers — */
.col-headers { display:grid; grid-template-columns:1fr 90px 130px 1fr 110px 100px; gap:8px; padding:8px 12px; font-size:11px; font-weight:600; color:var(--text2); text-transform:uppercase; letter-spacing:0.05em; background:var(--surface); border-bottom:1px solid var(--border); position:sticky; top:50px; z-index:50; }
.col-headers span:nth-child(2) { text-align:right; }

/* — Report view — */
.report-container { max-width:1400px; margin:0 auto; padding:16px 2rem 80px; }
.report-toolbar { display:flex; gap:8px; flex-wrap:wrap; padding:12px 0; border-bottom:1px solid var(--border); margin-bottom:16px; }
.report-toolbar button { font-family:inherit; font-size:12px; font-weight:600; padding:7px 14px; border-radius:8px; border:1px solid var(--border); background:var(--surface); color:var(--text); cursor:pointer; transition:all 0.15s; }
.report-toolbar button:hover { background:var(--surface2); }
.report-toolbar button.success { background:var(--green)!important; border-color:var(--green)!important; color:#fff!important; }
.tab-bar { display:flex; gap:4px; margin-bottom:16px; }
.tab-bar button { font-family:inherit; font-size:12px; font-weight:600; padding:7px 14px; border-radius:8px; border:1px solid transparent; background:transparent; color:var(--text2); cursor:pointer; transition:all 0.15s; }
.tab-bar button:hover { color:var(--text); }
.tab-bar button.active { background:var(--surface); color:var(--text); border-color:var(--border); }
.preview { padding:8px 0; }
.preview table { font-size:13px; }
.error-msg { padding:40px; text-align:center; color:var(--red); }
.btn-purge { font-family:inherit; font-size:12px; font-weight:600; padding:7px 14px; border-radius:8px; border:1px solid rgba(220,38,38,0.3); background:rgba(220,38,38,0.06); color:var(--red); cursor:pointer; transition:all 0.15s; }
.btn-purge:hover { background:rgba(220,38,38,0.12); }

</style>
</head>

<script>
// ===== CONFIG =====
const API_KEY = 'AIzaSyB9g7c6llswswuZQ2I5y2MwGk6BzYEtHsY';
const INJ_SHEETS_ID = '14TQPdQ9mDhHMMMQa5vcs0coL98ZloHORtYElDikKoWY';
const SHEETS_API = 'https://sheets.googleapis.com/v4/spreadsheets';
const CSV_URL = `${SHEETS_API}/${INJ_SHEETS_ID}/values/Injuries?key=${API_KEY}`;
const ROSTER_SHEETS_ID = '11llk0icQqoi0JwJXat5KO8y2RQeBMN5rS9FhAY56Idc';

const ROSTER_CSV_URL = `${SHEETS_API}/${ROSTER_SHEETS_ID}/values/Sheet1?key=${API_KEY}`;
const JSON_URL = 'injuries.json';

const NBA_TEAMS = [
  'Atlanta','Boston','Brooklyn','Charlotte','Chicago','Cleveland',
  'Dallas','Denver','Detroit','Golden State','Houston','Indiana',
  'LA Clippers','LA Lakers','Memphis','Miami','Milwaukee','Minnesota',
  'New Orleans','New York','Oklahoma City','Orlando','Philadelphia','Phoenix',
  'Portland','Sacramento','San Antonio','Toronto','Utah','Washington'
];
const ELIMINATED_TEAMS = new Set(['Milwaukee','Chicago','Brooklyn','Indiana','Washington','New Orleans','Dallas','Memphis','Sacramento','Utah','Miami','LA Clippers']);
const PLAYOFF_TEAMS = NBA_TEAMS.filter(t => !ELIMINATED_TEAMS.has(t));

const TEAM_IDS = {
  'Atlanta':1610612737,'Boston':1610612738,'Brooklyn':1610612751,
  'Charlotte':1610612766,'Chicago':1610612741,'Cleveland':1610612739,
  'Dallas':1610612742,'Denver':1610612743,'Detroit':1610612765,
  'Golden State':1610612744,'Houston':1610612745,'Indiana':1610612754,
  'LA Clippers':1610612746,'LA Lakers':1610612747,'Memphis':1610612763,
  'Miami':1610612748,'Milwaukee':1610612749,'Minnesota':1610612750,
  'New Orleans':1610612740,'New York':1610612752,'Oklahoma City':1610612760,
  'Orlando':1610612753,'Philadelphia':1610612755,'Phoenix':1610612756,
  'Portland':1610612757,'Sacramento':1610612758,'San Antonio':1610612759,
  'Toronto':1610612761,'Utah':1610612762,'Washington':1610612764
};
const TEAM_ABBREV = {
  'Atlanta':'ATL','Boston':'BOS','Brooklyn':'BKN','Charlotte':'CHA','Chicago':'CHI','Cleveland':'CLE',
  'Dallas':'DAL','Denver':'DEN','Detroit':'DET','Golden State':'GSW','Houston':'HOU','Indiana':'IND',
  'LA Clippers':'LAC','LA Lakers':'LAL','Memphis':'MEM','Miami':'MIA','Milwaukee':'MIL','Minnesota':'MIN',
  'New Orleans':'NOP','New York':'NYK','Oklahoma City':'OKC','Orlando':'ORL','Philadelphia':'PHI','Phoenix':'PHX',
  'Portland':'POR','Sacramento':'SAC','San Antonio':'SAS','Toronto':'TOR','Utah':'UTA','Washington':'WAS'
};
const STATUSES = ['Available','Probable','Questionable','Doubtful','Out','Left Game'];
const STATUS_GRAVITY = { 'Out':0,'Left Game':0.5,'Doubtful':1,'Questionable':2,'Probable':3,'Available':4 };

function teamLogo(t) { const id=TEAM_IDS[t]; return id ? `https://cdn.nba.com/logos/nba/${id}/primary/L/logo.svg` : ''; }
function logoImg(t) { const u=teamLogo(t); return u ? `<img src="${u}" width="28" height="28" style="vertical-align:middle;">` : ''; }
function fmtSal(n) { if(n>=1e6) return '$'+(n/1e6).toFixed(1)+'M'; if(n>=1e3) return '$'+(n/1e3).toFixed(0)+'K'; return '$'+n.toLocaleString(); }
function fmtSalFull(n) { return '$'+n.toLocaleString(); }
function fmtDate(iso) { const d=new Date(iso+'T00:00:00'); const m=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']; return m[d.getMonth()]+' '+d.getDate(); }
function sColor(s) { return {Out:'#ef4444','Left Game':'#f97316',Doubtful:'#f97316',Questionable:'#eab308',Probable:'#22c55e',Available:'#10b981'}[s]||'#888'; }
function sSpan(s) { return `<span style="color:${sColor(s)};font-weight:700;white-space:nowrap;">${s}</span>`; }
function statusClass(s) { return 's-'+s.toLowerCase().replace(/\s+/g,'-'); }
function lastName(name) { const parts = name.trim().split(/\s+/); return parts.length > 1 ? parts[parts.length-1] : name; }
function todayISO() {
  return new Date().toLocaleDateString('en-CA', { timeZone: 'America/Los_Angeles' });
}

async function fetchSheets(url) {
  const r = await fetch(url);
  if (!r.ok) return r;
  const json = await r.json();
  const vals = json.values || [];
  const csv = vals.map(row => row.map(c => c != null && (c.includes(',') || c.includes('"') || c.includes('\n')) ? '"' + c.replace(/"/g,'""') + '"' : (c || '')).join(',')).join('\n');
  return { ok: true, status: 200, text: () => Promise.resolve(csv), json: () => Promise.resolve(json) };
}

function parseCSV(text) {
  const rows=[]; let cur='',inQ=false,row=[];
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(c==='"'){if(inQ&&text[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
    else if(c===','&&!inQ){row.push(cur);cur='';}
    else if((c==='\n'||c==='\r')&&!inQ){if(c==='\r'&&text[i+1]==='\n')i++;row.push(cur);cur='';rows.push(row);row=[];}
    else cur+=c;
  }
  if(cur||row.length){row.push(cur);rows.push(row);}
  return rows;
}

// ===== SHARED STATE =====
let roster = {};      // player -> {team, salary}
let teamSalaries = {}; // team -> total salary
let daysMap = {};     // player -> days since last game
let jsonEntries = []; // raw injuries.json
let latestStatus = {}; // player -> {status, injury, date}
let modifications = {}; // player -> {status, injury, date} (admin edits)
let lastSyncedChanges = []; // captured at push time for report generation

// ===== GITHUB AUTO-SYNC =====
const GH_REPO = 'aderoa/Injuries';
const GH_FILE = 'injuries.json';
const GH_BRANCH = 'main';
const GH_API = `https://api.github.com/repos/${GH_REPO}/contents/${GH_FILE}`;
let _ghToken = localStorage.getItem('gh_injuries_token') || '';
let _ghSyncTimer = null;
let _ghSyncing = false;
let _ghLastSha = null; // cached SHA to avoid extra GET

// ===== DATA LOADING =====
async function loadData() {
  const [csvR, rosterR, jsonR] = await Promise.all([
    fetchSheets(CSV_URL),
    fetchSheets(ROSTER_CSV_URL),
    fetch(JSON_URL + '?t=' + Date.now())
  ]);
  if (!csvR.ok) throw new Error('Injuries CSV fetch failed: ' + csvR.status);
  if (!rosterR.ok) throw new Error('Roster CSV fetch failed: ' + rosterR.status);
  if (!jsonR.ok) throw new Error('injuries.json fetch failed: ' + jsonR.status);

  const csvText = await csvR.text();
  const rosterText = await rosterR.text();
  const injuries = await jsonR.json();
  const injRows = parseCSV(csvText);
  const rosterRows = parseCSV(rosterText);

  // Parse roster by header names (same source as Depth Charts)
  roster = {}; teamSalaries = {};
  if (rosterRows.length > 1) {
    const header = rosterRows[0];
    const col = n => header.findIndex(h => h.toUpperCase().trim() === n.toUpperCase());
    const playerIdx = col('PLAYER'), teamIdx = col('TEAM'), salaryIdx = col('2026');
    if (playerIdx >= 0 && teamIdx >= 0) {
      for (let i = 1; i < rosterRows.length; i++) {
        const row = rosterRows[i];
        const player = (row[playerIdx] || '').trim();
        const team = (row[teamIdx] || '').trim();
        const salRaw = salaryIdx >= 0 ? (row[salaryIdx] || '0').replace(/[$,]/g, '') : '0';
        const salary = parseInt(salRaw) || 0;
        const stIdx = col('ST 25-26');
        const contractStatus = stIdx >= 0 ? (row[stIdx] || '').trim() : '';
        if (player && team) {
          roster[player] = { team, salary, contractStatus };
          teamSalaries[team] = (teamSalaries[team] || 0) + salary;
        }
      }
    }
  }

  // Days since last game: cols 71(player), 73(days) from Injuries CSV
  // This section has NO header row — data starts at row 0
  daysMap = {};
  for (let i = 0; i < injRows.length; i++) {
    const r = injRows[i];
    const p = (r[71] || '').trim();
    const d = (r[73] || '').trim();
    if (p && p !== '#N/A' && /^\d+$/.test(d)) daysMap[p] = parseInt(d);
  }
  console.log('[Injuries] daysMap:', Object.keys(daysMap).length, 'entries');

  // Process JSON entries — use local committed cache if it exists
  // This handles the race condition where auto-sync pushes to GitHub but CDN is still stale
  let localCommitted = null;
  try {
    const cached = localStorage.getItem('injuries_committed');
    if (cached) localCommitted = JSON.parse(cached);
  } catch(e) {}

  // Always prefer local committed cache — it was saved after a successful GitHub push
  // and is authoritative over potentially stale CDN data
  if (localCommitted && localCommitted.length >= 1) {
    jsonEntries = localCommitted;
  } else {
    jsonEntries = injuries;
  }

  latestStatus = {};
  const prev = {};
  for (const e of jsonEntries) {
    if (latestStatus[e.player]) prev[e.player] = latestStatus[e.player];
    latestStatus[e.player] = { status: e.status, injury: e.injury, date: e.date };
  }

  return { prev };
}

async function initAdmin() {
  try {
    // Load saved modifications from localStorage
    try {
      const saved = localStorage.getItem('injuries_modifications');
      if (saved) { modifications = JSON.parse(saved); }
    } catch(e) {}
    await loadData();
    document.getElementById('lastUpdate').textContent = `${Object.keys(roster).length} players loaded`;
    renderRoster();
    updateBadge();
    // Initialize GitHub sync status
    if (_ghToken) {
      setSyncStatus('idle', 'Auto-sync on');
      // Pre-fetch SHA for faster first push
      try {
        const r = await fetch(GH_API + '?ref=' + GH_BRANCH, {
          headers: { 'Authorization': 'token ' + _ghToken, 'Accept': 'application/vnd.github.v3+json' }
        });
        if (r.ok) { const d = await r.json(); _ghLastSha = d.sha; }
      } catch(e) {}
    } else {
      setSyncStatus('notoken', 'Set token to auto-sync');
    }
  } catch(e) {
    document.getElementById('rosterArea').innerHTML = `<div class="error-msg">Error: ${e.message}</div>`;

function renderRoster() {
  const area = document.getElementById('rosterArea');
  let html = '';

  for (const team of PLAYOFF_TEAMS) {
    const players = Object.entries(roster)
      .filter(([_,v]) => v.team === team)
      .sort((a,b) => lastName(a[0]).localeCompare(lastName(b[0])));
    if (!players.length) continue;

    const injuredCount = players.filter(([name]) => {
      const mod = modifications[name];
      const cur = mod || latestStatus[name];
      return cur && cur.status !== 'Available';
    }).length;

    html += `<div class="team-section" data-team="${team}" id="team-${team.replace(/\s/g,'')}">`;
    html += `<div class="team-header" onclick="toggleTeam(this)">`;
    html += `<img src="${teamLogo(team)}" alt="${team}">`;
    html += `<span class="team-name">${team}</span>`;
    html += `<span class="team-count">${players.length} players</span>`;
    html += `<span class="team-injured ${injuredCount?'':'none'}">${injuredCount} injured</span>`;
    html += `<span class="chevron">▼</span>`;
    html += `</div>`;
    html += `<div class="team-players">`;

    for (const [name, info] of players) {
      const cur = modifications[name] || latestStatus[name] || { status:'Available', injury:'', date:'' };
      const isModified = !!modifications[name];
      const isAvail = cur.status === 'Available';

      html += `<div class="player-row ${isModified?'modified':''}" data-player="${name}" data-team="${team}">`;
      html += `<span class="player-name" title="${name}">${name}</span>`;
      html += `<span class="player-salary">${fmtSal(info.salary)}</span>`;

      // Status select
      html += `<select class="${statusClass(cur.status)}" onchange="onStatusChange('${name.replace(/'/g,"\\'")}',this)">`;
      for (const s of STATUSES) {
        html += `<option value="${s}" ${s===cur.status?'selected':''}>${s}</option>`;
      }
      html += `</select>`;

      // Injury input
      html += `<input type="text" value="${cur.injury||''}" class="${isAvail?'inactive':''}" placeholder="${isAvail?'—':'Injury reason'}" oninput="onInjuryChange('${name.replace(/'/g,"\\'")}',this)" onfocus="this.classList.remove('inactive')">`;

      // Date input
      html += `<input type="date" value="${cur.date||''}" class="${isAvail?'inactive':''}" onchange="onDateChange('${name.replace(/'/g,"\\'")}',this)">`;

      // Previous status select (editable, defaults to computed prev)
      const prevSt = getEffectivePrevStatus(name);
      html += `<select class="prev-status ${statusClass(prevSt)}" onchange="onPrevStatusChange('${name.replace(/'/g,"\\'")}',this)">`;
      html += `<option value="" ${!prevSt?'selected':''}>—</option>`;
      for (const s of STATUSES) {
        html += `<option value="${s}" ${s===prevSt?'selected':''}>${s}</option>`;
      }
      html += `</select>`;

      html += `</div>`;
    }

    html += `</div></div>`;
  }

  area.innerHTML = html;
}

function toggleTeam(el) {
  el.closest('.team-section').classList.toggle('collapsed');
}

function getEffectiveStatus(name) {
  return modifications[name] || latestStatus[name] || { status:'Available', injury:'', date:'' };
}

function onStatusChange(name, sel) {
  const row = sel.closest('.player-row');
  const injInput = row.querySelector('input[type="text"]');
  const dateInput = row.querySelector('input[type="date"]');
  const newStatus = sel.value;

  // Determine the original status from JSON
  const original = latestStatus[name] || { status:'Available', injury:'', date:'' };

  // Effective status BEFORE this change (prior modification or original)
  const effectiveBefore = modifications[name] ? modifications[name].status : original.status;

  // Update select color class
  sel.className = statusClass(newStatus);

  if (newStatus === original.status && !injInput.value && !dateInput.value) {
    // Reverted to original — remove modification
    delete modifications[name];
    row.classList.remove('modified');
    injInput.className = newStatus==='Available' ? 'inactive' : '';
    dateInput.className = newStatus==='Available' ? 'inactive' : '';
  } else {
    // Set date to today on any status change
    dateInput.value = todayISO();
    // Carry forward injury from JSON if available and field empty
    if (!injInput.value && original.injury && newStatus !== 'Available') {
      injInput.value = original.injury;
    }

    modifications[name] = {
      status: newStatus,
      injury: injInput.value,
      date: dateInput.value,
      prevStatus: (modifications[name]?.prevStatus != null) ? modifications[name].prevStatus : (prevStatusSnapshot[name] || effectiveBefore)
    };
    row.classList.add('modified');
    injInput.classList.remove('inactive');
    dateInput.classList.remove('inactive');
  }

  // Update the prev-status select visually
  const prevSel = row.querySelector('select.prev-status');
  if (prevSel) {
    const ps = getEffectivePrevStatus(name);
    prevSel.value = ps || '';
    prevSel.className = 'prev-status ' + statusClass(ps || '');
  }

  updateBadge();
  updateTeamInjuredCounts();
}

function onInjuryChange(name, inp) {
  const row = inp.closest('.player-row');
  const sel = row.querySelector('select');
  const dateInput = row.querySelector('input[type="date"]');
  const original = latestStatus[name] || { status:'Available', injury:'', date:'' };
  const effectiveBefore = modifications[name] ? modifications[name].status : original.status;

  if (sel.value === original.status && !inp.value && !dateInput.value) {
    delete modifications[name];
    row.classList.remove('modified');
  } else {
    if (!dateInput.value) dateInput.value = todayISO();
    modifications[name] = { status: sel.value, injury: inp.value, date: dateInput.value, prevStatus: (modifications[name]?.prevStatus != null) ? modifications[name].prevStatus : (prevStatusSnapshot[name] || effectiveBefore) };
    row.classList.add('modified');
  }
  updateBadge();
}

function onDateChange(name, inp) {
  const row = inp.closest('.player-row');
  const sel = row.querySelector('select');
  const injInput = row.querySelector('input[type="text"]');
  const original = latestStatus[name] || { status:'Available', injury:'', date:'' };
  const effectiveBefore = modifications[name] ? modifications[name].status : original.status;
  const prevSt = modifications[name]?.prevStatus !== undefined ? modifications[name].prevStatus : null;

  if (sel.value === original.status && !injInput.value && !inp.value) {
    delete modifications[name];
    row.classList.remove('modified');
  } else {
    modifications[name] = { status: sel.value, injury: injInput.value, date: inp.value, prevStatus: prevSt !== null ? prevSt : (prevStatusSnapshot[name] || effectiveBefore) };
    row.classList.add('modified');
  }
  updateBadge();
}

function getEffectivePrevStatus(name) {
  // 1) If modification has explicit prevStatus, use it
  if (modifications[name] && modifications[name].prevStatus != null) {
    return modifications[name].prevStatus;
  }
  // 2) Check purge snapshot (set when Purge Available is clicked)
  if (prevStatusSnapshot[name]) {
    return prevStatusSnapshot[name];
  }
  // 3) Check latest JSON entry for this player for prevStatus field
  const entries = jsonEntries.filter(e => e.player === name);
  const lastEntry = entries.length ? entries[entries.length - 1] : null;
  if (lastEntry && lastEntry.prevStatus != null) {
    return lastEntry.prevStatus;
  }
  // 4) Scan entries for latest status from a prior date
  const today = todayISO();
  let prev = null;
  for (const e of jsonEntries) {
    if (e.player === name && e.date && e.date.length >= 10 && e.date < today) {
      prev = e.status;
    }
  }
  return prev || '';
}

function onPrevStatusChange(name, sel) {
  const row = sel.closest('.player-row');
  const statusSel = row.querySelector('select:not(.prev-status)');
  const injInput = row.querySelector('input[type="text"]');
  const dateInput = row.querySelector('input[type="date"]');
  const original = latestStatus[name] || { status:'Available', injury:'', date:'' };

  // Update color class
  sel.className = 'prev-status ' + statusClass(sel.value || '');

  // Ensure a modification record exists
  if (!modifications[name]) {
    modifications[name] = {
      status: statusSel.value,
      injury: injInput.value,
      date: dateInput.value || todayISO(),
      prevStatus: sel.value || null
    };
  } else {
    modifications[name].prevStatus = sel.value || null;
  }
  row.classList.add('modified');
  updateBadge();
}

function updateBadge() {
  const count = Object.keys(modifications).length;
  const badge = document.getElementById('changesBadge');
  badge.textContent = `${count} change${count!==1?'s':''}`;
  badge.className = count ? 'badge has-changes' : 'badge';
  // Auto-save to localStorage
  try { localStorage.setItem('injuries_modifications', JSON.stringify(modifications)); } catch(e) {}
  // Broadcast full latest status for other apps (Depth Charts, etc.)
  broadcastInjuries();
  // Debounced auto-push to GitHub
  scheduleGitHubSync();
}

// Write full latest injury status to localStorage so other apps get instant access
function broadcastInjuries() {
  try {
    const latest = {};
    // Start with JSON base
    for (const e of jsonEntries) {
      latest[e.player] = { status: e.status, injury: e.injury || '', date: e.date || '' };
    }
    // Overlay modifications
    for (const [name, mod] of Object.entries(modifications)) {
      latest[name] = { status: mod.status, injury: mod.injury || '', date: mod.date || '' };
    }
    localStorage.setItem('injuries_latest', JSON.stringify(latest));
  } catch(e) {}
}

// ===== GITHUB SYNC ENGINE =====
function setSyncStatus(state, msg) {
  const el = document.getElementById('syncStatus');
  if (!el) return;
  const icons = { idle:'🔗', syncing:'🔄', success:'✅', error:'❌', notoken:'🔑' };
  el.innerHTML = `${icons[state]||''} <span>${msg}</span>`;
  el.className = 'sync-status sync-' + state;
}

function setupGitHubToken() {
  const current = _ghToken ? '(token is set)' : '(no token)';
  const token = prompt(`GitHub Personal Access Token ${current}\n\nNeeds "Contents: Read and write" permission on ${GH_REPO}.\n\nPaste token (or leave blank to clear):`, '');
  if (token === null) return; // cancelled
  _ghToken = token.trim();
  if (_ghToken) {
    localStorage.setItem('gh_injuries_token', _ghToken);
    setSyncStatus('idle', 'Token saved');
  } else {
    localStorage.removeItem('gh_injuries_token');
    _ghToken = '';
    setSyncStatus('notoken', 'No token');
  }
}

function scheduleGitHubSync() {
  if (!_ghToken) return;
  clearTimeout(_ghSyncTimer);
  _ghSyncTimer = setTimeout(() => pushToGitHub(), 1500);
}

async function pushToGitHub() {
  if (!_ghToken) { setSyncStatus('notoken', 'Set token'); return; }
  if (_ghSyncing) { scheduleGitHubSync(); return; } // retry after current push
  _ghSyncing = true;
  setSyncStatus('syncing', 'Pushing…');

  // Snapshot the modifications we're about to push — any changes made during
  // the async push will be preserved and not wiped
  const pushingMods = JSON.parse(JSON.stringify(modifications));
  const pushingNames = new Set(Object.keys(pushingMods));

  try {
    // Build merged JSON
    const merged = buildMergedJSON();
    const content = JSON.stringify(merged, null, 2) + '\n';
    const b64 = btoa(unescape(encodeURIComponent(content)));

    // Get current SHA (use cached if available, otherwise fetch)
    let sha = _ghLastSha;
    if (!sha) {
      const getR = await fetch(GH_API + '?ref=' + GH_BRANCH, {
        headers: { 'Authorization': 'token ' + _ghToken, 'Accept': 'application/vnd.github.v3+json' }
      });
      if (!getR.ok) throw new Error('GET failed: ' + getR.status);
      const getData = await getR.json();
      sha = getData.sha;
    }

    // Build commit message
    const names = Object.keys(pushingMods);
    const msg = names.length <= 3
      ? `Update: ${names.join(', ')}`
      : `Update ${names.length} players`;

    // PUT to update file
    const putR = await fetch(GH_API, {
      method: 'PUT',
      headers: {
        'Authorization': 'token ' + _ghToken,
        'Accept': 'application/vnd.github.v3+json',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        message: msg,
        content: b64,
        sha: sha,
        branch: GH_BRANCH
      })
    });

    if (!putR.ok) {
      const err = await putR.json().catch(() => ({}));
      if (putR.status === 409) {
        // SHA conflict — clear cache and retry once
        _ghLastSha = null;
        _ghSyncing = false;
        return pushToGitHub();
      }
      throw new Error(err.message || putR.status);
    }

    const putData = await putR.json();
    _ghLastSha = putData.content.sha; // cache new SHA

    // Merge pushed modifications into jsonEntries
    jsonEntries = merged;
    // Capture pushed changes for report generation (before clearing)
    const syncedEntries = [];
    for (const name of pushingNames) {
      if (pushingMods[name]) {
        syncedEntries.push({
          name,
          status: pushingMods[name].status,
          injury: pushingMods[name].injury || '',
          prevStatus: pushingMods[name].prevStatus || '',
          team: (roster[name] || {}).team || ''
        });
      }
    }
    if (syncedEntries.length > 0) lastSyncedChanges = syncedEntries;
    // Only clear modifications that were actually in this push — preserve any
    // changes made during the async network call
    for (const name of pushingNames) {
      if (modifications[name] && JSON.stringify(modifications[name]) === JSON.stringify(pushingMods[name])) {
        delete modifications[name];
      }
    }
    try { localStorage.setItem('injuries_modifications', JSON.stringify(modifications)); } catch(e) {}
    // Cache committed JSON locally so page refresh uses it even if GitHub CDN is stale
    try { localStorage.setItem('injuries_committed', JSON.stringify(jsonEntries)); } catch(e) {}

    // Broadcast updated data to other apps immediately
    broadcastInjuries();

    // Update latestStatus from merged data so UI stays correct
    latestStatus = {};
    for (const e of jsonEntries) {
      latestStatus[e.player] = { status: e.status, injury: e.injury, date: e.date };
    }

    // Update UI — reflect remaining unpushed modifications
    const remaining = Object.keys(modifications).length;
    const badge = document.getElementById('changesBadge');
    badge.textContent = `${remaining} change${remaining!==1?'s':''}`;
    badge.className = remaining ? 'badge has-changes' : 'badge';
    if (!remaining) {
      document.querySelectorAll('.player-row.modified').forEach(r => r.classList.remove('modified'));
    }

    setSyncStatus('success', 'Synced');
    setTimeout(() => setSyncStatus('idle', 'Auto-sync on'), 3000);

    // If changes were made during push, immediately schedule another sync
    if (remaining > 0) scheduleGitHubSync();

  } catch(err) {
    console.error('GitHub sync error:', err);
    setSyncStatus('error', err.message || 'Sync failed');
  } finally {
    _ghSyncing = false;
  }
}

function updateTeamInjuredCounts() {
  document.querySelectorAll('.team-section').forEach(sec => {
    const team = sec.dataset.team;
    const rows = sec.querySelectorAll('.player-row');
    let injured = 0;
    rows.forEach(r => {
      const sel = r.querySelector('select');
      if (sel && sel.value !== 'Available') injured++;
    });
    const badge = sec.querySelector('.team-injured');
    if (badge) {
      badge.textContent = `${injured} injured`;
      badge.classList.toggle('none', injured === 0);
    }
  });
}

function filterPlayers() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  document.querySelectorAll('.team-section').forEach(sec => {
    let anyVisible = false;
    sec.querySelectorAll('.player-row').forEach(row => {
      const name = row.dataset.player.toLowerCase();
      const team = row.dataset.team.toLowerCase();
      let show = !q || name.includes(q) || team.includes(q);

      // Apply active filter
      if (show && activeFilter === 'modified') show = row.classList.contains('modified');
      if (show && activeFilter === 'injured') {
        const sel = row.querySelector('select');
        show = sel && sel.value !== 'Available';
      }
      if (show && activeFilter === 'available') {
        const sel = row.querySelector('select');
        show = sel && sel.value === 'Available';
      }

      row.style.display = show ? '' : 'none';
      if (show) anyVisible = true;
    });
    sec.style.display = anyVisible ? '' : 'none';
    if (anyVisible) sec.classList.remove('collapsed');
  });
}

function toggleFilter(type, btn) {
  if (activeFilter === type) {
    activeFilter = null;
    btn.classList.remove('active');
  } else {
    activeFilter = type;
    document.querySelectorAll('.filter-bar .filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }
  filterPlayers();
}

function resetAll() {
  if (Object.keys(modifications).length && !confirm('Reset all changes?')) return;
  modifications = {};
  prePurgeSnapshot = null;
  document.getElementById('undoBtn').style.display = 'none';
  try { localStorage.removeItem('injuries_modifications'); } catch(e) {}
  try { localStorage.removeItem('injuries_committed'); } catch(e) {}
  renderRoster();
  updateBadge();
}

let prePurgeSnapshot = null;
let prevStatusSnapshot = {};    // player → status at time of last purge
let prePurgePrevSnapshot = {};  // for undo

function purgeAvailable(btn) {
  // Save snapshot for undo
  prePurgeSnapshot = JSON.parse(JSON.stringify(modifications));
  prePurgePrevSnapshot = prevStatusSnapshot ? {...prevStatusSnapshot} : {};

  // Step 1: Snapshot ALL current statuses → prevStatusSnapshot
  // This sets the "previous status" baseline for the new day
  prevStatusSnapshot = {};
  for (const [player, entry] of Object.entries(latestStatus)) {
    const effective = modifications[player] || entry;
    prevStatusSnapshot[player] = effective.status || 'Available';
  }
  // Also capture any modified players not in latestStatus
  for (const [player, mod] of Object.entries(modifications)) {
    if (!prevStatusSnapshot[player]) {
      prevStatusSnapshot[player] = mod.status || 'Available';
    }
  }

  // Step 2: Purge available players (clear injury + date) AND set prevStatus on all
  for (const [player, entry] of Object.entries(latestStatus)) {
    const effective = modifications[player] || entry;
    if (effective.status === 'Available' && (entry.injury || entry.date)) {
      // Purge: clear injury/date, carry prevStatus from snapshot
      modifications[player] = { status: 'Available', injury: '', date: '', prevStatus: prevStatusSnapshot[player] || null };
    } else if (modifications[player]) {
      // Non-available modified player: update prevStatus from snapshot
      modifications[player].prevStatus = prevStatusSnapshot[player] || modifications[player].prevStatus || null;
    }
  }

  renderRoster();
  updateBadge();
  updateTeamInjuredCounts();

  document.getElementById('undoBtn').style.display = '';
  const orig = btn.textContent;
  btn.textContent = '✓ Purged!'; btn.classList.add('active');
  setTimeout(() => { btn.textContent = orig; btn.classList.remove('active'); }, 2000);
}

function undoPurge(btn) {
  if (prePurgeSnapshot !== null) {
    modifications = prePurgeSnapshot;
    prePurgeSnapshot = null;
    prevStatusSnapshot = prePurgePrevSnapshot;
    prePurgePrevSnapshot = {};
    renderRoster();
    updateBadge();
    updateTeamInjuredCounts();
  }
  btn.style.display = 'none';
}

// ===== JSON GENERATION =====
function buildMergedJSON() {
  // Start with original entries
  const merged = [...jsonEntries];

  // Append modifications as new entries
  for (const [player, mod] of Object.entries(modifications)) {
    merged.push({
      player,
      status: mod.status,
      injury: mod.injury || '',
      date: mod.date !== undefined && mod.date !== null ? mod.date : todayISO(),
      prevStatus: mod.prevStatus || prevStatusSnapshot[player] || null
    });
  }

  return merged;
}

function copyJSON(btn) {
  const merged = buildMergedJSON();
  const json = JSON.stringify(merged, null, 2);
  navigator.clipboard.writeText(json).then(() => {
    const orig = btn.textContent;
    btn.textContent = '✓ Copied!'; btn.classList.add('success');
    setTimeout(() => { btn.textContent = orig; btn.classList.remove('success'); }, 2000);
  });
}

// ===== INJURY REPORT GENERATOR =====
const HOOPSHYPE_LINK = 'https://www.hoopshype.com/story/sports/nba/2025/10/23/nba-injury-tracker-whos-not-available-right-now/86822180007/';

const STATUS_SEVERITY = { 'Available':0, 'Probable':1, 'Questionable':2, 'Doubtful':3, 'Out':4, 'Left Game':5 };

const TEAM_NICKNAMES = {
  'Atlanta':'Hawks','Boston':'Celtics','Brooklyn':'Nets','Charlotte':'Hornets',
  'Chicago':'Bulls','Cleveland':'Cavaliers','Dallas':'Mavericks','Denver':'Nuggets',
  'Detroit':'Pistons','Golden State':'Warriors','Houston':'Rockets','Indiana':'Pacers',
  'LA Clippers':'Clippers','LA Lakers':'Lakers','Memphis':'Grizzlies','Miami':'Heat',
  'Milwaukee':'Bucks','Minnesota':'Timberwolves','New Orleans':'Pelicans','New York':'Knicks',
  'Oklahoma City':'Thunder','Orlando':'Magic','Philadelphia':'76ers','Phoenix':'Suns',
  'Portland':'Trail Blazers','Sacramento':'Kings','San Antonio':'Spurs','Toronto':'Raptors',
  'Utah':'Jazz','Washington':'Wizards'
};

function describeTransition(name, mod, prevStatus) {
  const injury = mod.injury ? ` (${mod.injury.toLowerCase()})` : '';
  const newStatus = mod.status;
  const prevSev = STATUS_SEVERITY[prevStatus] ?? -1;
  const newSev = STATUS_SEVERITY[newStatus] ?? -1;

  if (newStatus === 'Available') {
    if (prevSev > 0) return `upgraded ${name}${injury} to available`;
    return `listed ${name}${injury} as available`;
  }
  if (prevStatus === 'Available' || prevSev <= 0) {
    // Was healthy or new
    return `listed ${name}${injury} as ${newStatus.toLowerCase()}`;
  }
  if (newSev < prevSev) {
    return `upgraded ${name}${injury} to ${newStatus.toLowerCase()}`;
  }
  if (newSev > prevSev) {
    return `downgraded ${name}${injury} to ${newStatus.toLowerCase()}`;
  }
  return `listed ${name}${injury} as ${newStatus.toLowerCase()}`;
}

function generateInjuryReport(btn) {
  // Use current modifications if any, otherwise fall back to last synced changes
  let changes = [];
  const modEntries = Object.entries(modifications);

  if (modEntries.length > 0) {
    // Unsaved changes — build from modifications
    for (const [name, mod] of modEntries) {
      changes.push({
        name,
        status: mod.status,
        injury: mod.injury || '',
        prevStatus: mod.prevStatus || (latestStatus[name] || {}).status || 'Available',
        team: (roster[name] || {}).team || 'Unknown'
      });
    }
  } else if (lastSyncedChanges.length > 0) {
    // Modifications already pushed — use captured snapshot
    changes = lastSyncedChanges;
  } else {
    alert('No modifications to report. Make changes, then click Generate Report (before or after sync).');
    return;
  }

  // Group by team
  const byTeam = {};
  for (const c of changes) {
    if (!byTeam[c.team]) byTeam[c.team] = [];
    byTeam[c.team].push({ name: c.name, mod: { status: c.status, injury: c.injury }, prevStatus: c.prevStatus });
  }

  const paragraphs = [];
  const sortedTeams = Object.keys(byTeam).sort();

  for (const team of sortedTeams) {
    const players = byTeam[team];
    const nickname = TEAM_NICKNAMES[team] || team;

    // Sort: upgrades first, then downgrades, then same
    players.sort((a, b) => {
      const aSev = (STATUS_SEVERITY[a.mod.status] || 0) - (STATUS_SEVERITY[a.prevStatus] || 0);
      const bSev = (STATUS_SEVERITY[b.mod.status] || 0) - (STATUS_SEVERITY[b.prevStatus] || 0);
      if (aSev !== bSev) return aSev - bSev; // upgrades (negative) first
      return a.name.localeCompare(b.name);
    });

    const descriptions = players.map(p => describeTransition(p.name, p.mod, p.prevStatus));

    // Build: "The Bulls have upgraded X to available, downgraded Y to out, and listed Z as questionable."
    let teamText;
    if (descriptions.length === 1) {
      teamText = `The ${nickname} have ${descriptions[0]}.`;
    } else if (descriptions.length === 2) {
      teamText = `The ${nickname} have ${descriptions[0]} and ${descriptions[1]}.`;
    } else {
      const allButLast = descriptions.slice(0, -1).join(', ');
      teamText = `The ${nickname} have ${allButLast}, and ${descriptions[descriptions.length - 1]}.`;
    }
    paragraphs.push(teamText);
  }

  const reportText = paragraphs.join('\n\n') + '\n\nFor the latest NBA injury updates: ' + HOOPSHYPE_LINK;

  showReportModal(reportText);
}

function showReportModal(text) {
  // Remove existing modal if any
  const existing = document.getElementById('reportModal');
  if (existing) existing.remove();

  const modal = document.createElement('div');
  modal.id = 'reportModal';
  modal.className = 'report-modal-overlay active';
  modal.innerHTML = `
    <div class="report-modal">
      <div class="report-modal-header">
        <h3>📝 Injury Report</h3>
        <button onclick="document.getElementById('reportModal').remove()">&times;</button>
      </div>
      <div class="report-modal-body">
        <textarea id="reportText" spellcheck="false">${text.replace(/</g,'&lt;')}</textarea>
      </div>
      <div class="report-modal-footer">
        <button onclick="document.getElementById('reportModal').remove()">Close</button>
        <button class="primary" onclick="copyReportText(this)">📋 Copy to Clipboard</button>
      </div>
    </div>
  `;
  modal.addEventListener('click', (e) => { if (e.target === modal) modal.remove(); });
  document.body.appendChild(modal);
  // Select all text
  const ta = document.getElementById('reportText');
  ta.focus();
  ta.select();
}

function copyReportText(btn) {
  const text = document.getElementById('reportText').value;
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓ Copied!';
    setTimeout(() => { btn.textContent = '📋 Copy to Clipboard'; }, 2000);
  });
}

// ===== PRESTO HTML GENERATION (same 4 tables) =====
function buildPrestoHTML() {
  const merged = buildMergedJSON();

  // Rebuild latest + prev from merged
  const lat = {}, prv = {};
  for (const e of merged) {
    if (lat[e.player]) prv[e.player] = lat[e.player];
    lat[e.player] = e;
  }

  return buildPrestoTables(merged, lat, prv, false);
}

function buildPrestoTables(entries, lat, prv, usePurge) {
  const today = todayISO();

  // Status class helper
  function sCls(s) { return {Out:'s-out','Left Game':'s-doubt',Doubtful:'s-doubt',Questionable:'s-quest',Probable:'s-prob',Available:'s-avail'}[s]||''; }
  function sTag(s) { const c = sCls(s); return c ? `<span class="${c}">${s}</span>` : s; }
  function lImg(t) { const u = teamLogo(t); return u ? `<img src="${u}" width="28" height="28" class="inj-logo">` : ''; }

  // Table 1: Today's Updates
  const prevDateStatus = {};
  for (const e of entries) {
    if (e.date && e.date.length >= 10 && e.date < today) prevDateStatus[e.player] = e.status;
  }
  const todayEntries = Object.entries(lat)
    .filter(([name,e]) => e.date === today && roster[name] && !ELIMINATED_TEAMS.has(roster[name].team))
    .map(([name,e]) => {
      const r = roster[name] || {};
      const prev = (e.prevStatus != null) ? e.prevStatus : prevDateStatus[name] || 'Available';
      return { player:name, status:e.status, injury:e.injury, prevStatus:prev, team:r.team||'', salary:r.salary||0 };
    })
    // Skip non-updates: same status with no injury info (e.g. corrected back to Available)
    .filter(e => !(e.status === e.prevStatus && !e.injury))
    .filter(e => !(e.status === 'Available' && e.prevStatus === 'Available'))
    .sort((a,b) => a.team !== b.team ? a.team.localeCompare(b.team) : lastName(a.player).localeCompare(lastName(b.player)));

  let h1 = `<h2>Today's injury updates</h2>\n<table class="inj-tbl"><thead><tr><th class="logo-col"></th><th>PLAYER</th><th>STATUS</th><th>INJURY</th><th>PREVIOUS STATUS</th><th>SALARY</th></tr></thead><tbody>\n`;
  let lt = '';
  if (!todayEntries.length) h1 += `<tr><td colspan="6">No updates today</td></tr>\n`;
  todayEntries.forEach(e => {
    const logo = e.team !== lt ? lImg(e.team) : ''; lt = e.team;
    h1 += `<tr><td class="logo-col">${logo}</td><td><strong>${e.player}</strong></td><td>${sTag(e.status)}</td><td>${e.injury}</td><td>${e.prevStatus ? sTag(e.prevStatus) : ''}</td><td>${fmtSal(e.salary)}</td></tr>\n`;
  });
  h1 += '</tbody></table>';

  // Table 2: Full Report (only Out, Doubtful, Left Game — Questionable/Probable stay with healthy players)
  const injuredStatuses = new Set(['Out', 'Doubtful', 'Left Game']);
  const allInjured = Object.entries(lat)
    .filter(([name,e]) => injuredStatuses.has(e.status) && roster[name] && !ELIMINATED_TEAMS.has(roster[name].team))
    .map(([name,e]) => ({ player:name, ...e, team:(roster[name]||{}).team||'', salary:(roster[name]||{}).salary||0, days:daysMap[name]||0 }))
    .sort((a,b) => a.team !== b.team ? a.team.localeCompare(b.team) : lastName(a.player).localeCompare(lastName(b.player)));

  let h2 = `<h2>Full injury report</h2>\n<table class="inj-tbl"><thead><tr><th class="logo-col"></th><th>PLAYER</th><th>SALARY</th><th>STATUS</th><th>INJURY</th><th>DATE</th></tr></thead><tbody>\n`;
  lt = '';
  allInjured.forEach(e => {
    const logo = e.team !== lt ? lImg(e.team) : ''; lt = e.team;
    h2 += `<tr><td class="logo-col">${logo}</td><td><strong>${e.player}</strong></td><td>${fmtSal(e.salary)}</td><td>${sTag(e.status)}</td><td>${e.injury||''}</td><td>${e.date ? fmtDate(e.date) : ''}</td></tr>\n`;
  });
  h2 += '</tbody></table>';

  // Table 3: Salary Per Team
  const teamInjSal = {};
  for (const e of allInjured) {
    if (e.status === 'Out' || e.status === 'Doubtful') teamInjSal[e.team] = (teamInjSal[e.team]||0) + e.salary;
  }
  let totalNBASal = 0, totalNBAInj = 0;
  for (const t of PLAYOFF_TEAMS) { totalNBASal += teamSalaries[t]||0; totalNBAInj += teamInjSal[t]||0; }
  const teamRows = PLAYOFF_TEAMS.map(t => ({
    team:t, injured:teamInjSal[t]||0, total:teamSalaries[t]||0,
    pct: teamSalaries[t] ? ((teamInjSal[t]||0)/teamSalaries[t]*100) : 0
  })).sort((a,b) => b.injured - a.injured);

  let h3 = `<h2>Injured salary per team</h2>\n<table class="inj-tbl"><thead><tr><th class="logo-col"></th><th>TEAM</th><th>INJURED SALARY</th><th>% SALARY</th></tr></thead><tbody>\n`;
  teamRows.forEach(r => {
    h3 += `<tr><td class="logo-col">${lImg(r.team)}</td><td><strong>${r.team}</strong></td><td>${fmtSalFull(r.injured)}</td><td>${r.pct.toFixed(2)}%</td></tr>\n`;
  });
  h3 += `<tr class="inj-total"><td class="logo-col"><img src="https://cdn.nba.com/logos/leagues/logo-nba.svg" width="28" height="28" class="inj-logo"></td><td>NBA</td><td>${fmtSalFull(totalNBAInj)}</td><td>${totalNBASal?(totalNBAInj/totalNBASal*100).toFixed(2):'0.00'}%</td></tr>\n`;
  h3 += '</tbody></table>';

  // Table 4: Highest-Paid Injured
  const topPaid = [...allInjured].sort((a,b) => b.salary - a.salary).slice(0,25);
  let h4 = `<h2>Highest-paid injured players</h2>\n<table class="inj-tbl"><thead><tr><th class="logo-col"></th><th>PLAYER</th><th>SALARY</th><th>DAYS SINCE LAST GAME</th></tr></thead><tbody>\n`;
  topPaid.forEach(e => {
    h4 += `<tr><td class="logo-col">${lImg(e.team)}</td><td><strong>${e.player}</strong></td><td>${fmtSalFull(e.salary)}</td><td>${e.days||''}</td></tr>\n`;
  });
  h4 += '</tbody></table>';

  return [h1, h2, h3, h4];
}

function copyPrestoHTML(btn) {
  const sections = buildPrestoHTML();
  const html = `${PRESTO_CSS}\n\n<div class="inj-wrap">\n\n${sections.join('\n\n<br>\n\n')}\n\n</div>`;
  navigator.clipboard.writeText(html).then(() => {
    const orig = btn.textContent;
    btn.textContent = '✓ Copied!'; btn.classList.add('success');
    setTimeout(() => { btn.textContent = orig; btn.classList.remove('success'); }, 2000);
  });
}

// ==========================================
// REPORT MODE (non-admin)
// ==========================================
let sectionsHTML = [];
let purgeActive = false;

async function initReport() {
  try {
    const { prev } = await loadData();
    buildReportSections(prev);
    document.getElementById('loading').style.display = 'none';
    document.getElementById('preview').style.display = 'block';
    showTab(-1, document.querySelector('.tab-bar button.active'));
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display = 'block';
    document.getElementById('error').textContent = 'Error: ' + e.message;
  }
}

function buildReportSections(prev) {
  const lat = {};
  for (const e of jsonEntries) { lat[e.player] = e; }
  sectionsHTML = buildPrestoTables(jsonEntries, lat, prev, purgeActive);
}

function showTab(idx, btn) {
  document.querySelectorAll('.tab-bar button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  // No preview render — data stays in memory for copy buttons only
  document.getElementById('preview').innerHTML = '<p style="color:#888;text-align:center;padding:2rem;">Preview disabled for performance. Use the copy buttons above.</p>';
}

function copyToClipboard(html, btn) {
  const orig = btn.textContent;
  const w = `${PRESTO_CSS}\n\n<div class="inj-wrap">\n${html}\n</div>`;
  navigator.clipboard.writeText(w).then(() => {
    btn.textContent = '✓ Copied!'; btn.classList.add('success');
    setTimeout(() => { btn.textContent = orig; btn.classList.remove('success'); }, 2000);
  });
}
function copyAll(btn) { copyToClipboard(sectionsHTML.join('\n<br>\n'), btn); }
function copySection(idx, btn) { if (sectionsHTML[idx]) copyToClipboard(sectionsHTML[idx], btn); }

async function refreshReport(btn) {
  const o = btn.textContent; btn.textContent = '⏳ Refreshing...'; btn.disabled = true;
  try {
    const { prev } = await loadData();
    buildReportSections(prev);
    showTab(-1, document.querySelector('.tab-bar button.active'));
  } catch(e) {}
  btn.textContent = '✓ Updated!'; btn.classList.add('success');
  setTimeout(() => { btn.textContent = o; btn.classList.remove('success'); btn.disabled = false; }, 2000);
}

function togglePurge(btn) {
  purgeActive = !purgeActive;
  btn.classList.toggle('active', purgeActive);
  btn.style.background = purgeActive ? 'rgba(239,68,68,0.2)' : '';
  const prv = {};
  const lat = {};
  for (const e of jsonEntries) {
    if (lat[e.player]) prv[e.player] = lat[e.player];
    lat[e.player] = e;
  }
  buildReportSections(prv);
  showTab(-1, document.querySelector('.tab-bar button.active'));
}
